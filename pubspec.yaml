name: stack_money
description: "A modern multi-tenant personal finance mobile app built with Flutter & Firebase. Replaces rigid spreadsheets with dynamic salary allocation, automated zero-friction closure wizards, and time-based data archiving via Cloud Functions."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  google_fonts: ^6.2.0
  go_router: ^16.3.0
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.1.0
  fl_chart: ^0.69.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0
  uuid: ^4.3.3
  local_auth: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/app_icon.png
    - assets/images/app_icon_nobackground.png
    - assets/images/app_icon_safe.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true

  image_path_android: "assets/images/app_icon_safe.png"
  adaptive_icon_background: "#141416"
  adaptive_icon_foreground: "assets/images/app_icon_safe.png"

  image_path_ios: "assets/images/app_icon_safe.png"

flutter_native_splash:
  color: "#141416"
  image: assets/images/app_icon_safe.png

  fullscreen: true

  android_12:
    color: "#141416"
    image: assets/images/app_icon_safe.png
